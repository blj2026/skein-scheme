/* v17 targeted fix: keep combo name clear; place name action beneath Grid */
.combo-strip{
  grid-template-columns:minmax(0,1fr) auto !important;
  grid-template-areas:"combo grid" "combo name" !important;
  align-items:start !important;
  column-gap:10px !important;
  row-gap:6px !important;
}
.combo-left{
  grid-area:combo !important;
  min-width:0 !important;
  padding-right:4px !important;
}
#comboName{
  display:block !important;
  max-width:100% !important;
}
.toggle{
  grid-area:grid !important;
  justify-self:end !important;
  align-self:start !important;
}
.name-new-btn{
  grid-area:name !important;
  justify-self:end !important;
  align-self:end !important;
  min-width:0 !important;
  height:auto !important;
  padding:2px 0 !important;
  border:0 !important;
  background:transparent !important;
  color:rgba(255,255,255,.78) !important;
  border-radius:0 !important;
  font-size:9px !important;
  line-height:1.1 !important;
  text-decoration:underline !important;
  text-underline-offset:3px !important;
}
.name-new-btn:active{color:#fff !important;}
@media (max-width:360px){
  .combo-strip{column-gap:8px !important;}
  .name-new-btn{font-size:8px !important;}
}


/* v20: make 5-color lock checkboxes clearer without changing layout */
.role-lock,
.lock-check,
input[type="checkbox"].role-lock,
.role-card input[type="checkbox"] {
  width: 24px !important;
  height: 24px !important;
  min-width: 24px !important;
  border: 2px solid #111 !important;
  border-radius: 7px !important;
  background: #fffaf2 !important;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.65), 0 1px 0 rgba(0,0,0,.12) !important;
  accent-color: #111 !important;
}

.role-card.locked .role-lock,
.role-lock.locked,
.role-card input[type="checkbox"]:checked {
  background: #111 !important;
  border-color: #111 !important;
  color: #fff !important;
  box-shadow: 0 0 0 2px rgba(17,17,17,.12) !important;
}

.role-lock::after {
  font-weight: 900 !important;
}

@media (max-width: 720px) {
  .role-lock,
  .lock-check,
  input[type="checkbox"].role-lock,
  .role-card input[type="checkbox"] {
    width: 25px !important;
    height: 25px !important;
    min-width: 25px !important;
    border-radius: 7px !important;
  }
}


/* v25: clean lock checkbox — empty when unlocked, real monochrome SVG lock when checked */
.role-lock,
.lock-check,
.role-card input[type="checkbox"] {
  appearance: none !important;
  -webkit-appearance: none !important;
  width: 25px !important;
  height: 25px !important;
  min-width: 25px !important;
  border: 2px solid #222 !important;
  border-radius: 7px !important;
  background-color: #fffaf2 !important;
  background-image: none !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
  background-size: 15px 15px !important;
  cursor: pointer !important;
  position: relative !important;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 1px 0 rgba(0,0,0,.12) !important;
}

.role-lock::before,
.lock-check::before,
.role-card input[type="checkbox"]::before,
.role-lock::after,
.lock-check::after,
.role-card input[type="checkbox"]::after {
  content: none !important;
  display: none !important;
}

.role-lock:checked,
.lock-check:checked,
.role-card input[type="checkbox"]:checked {
  background-color: #111 !important;
  border-color: #111 !important;
  background-image: url("data:image/svg+xml,%3Csvg width='18' height='18' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='6' y='10' width='12' height='10' rx='2' stroke='white' stroke-width='2.4'/%3E%3Cpath d='M8.5 10V7.8C8.5 5.7 10.1 4 12 4C13.9 4 15.5 5.7 15.5 7.8V10' stroke='white' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E") !important;
}

}

.saved-card .delete,
.delete {
  display: grid !important;

  height: 22px !important;
  border: 1px solid rgba(17,17,17,.45) !important;

  background: #f8f4ec !important;
  color: #111 !important;
  font-family: inherit !important;
  font-size: 14px !important;
  font-weight: 900 !important;
  line-height: 1 !important;
  cursor: pointer !important;
  opacity: .78 !important;
}

.saved-card .delete:hover,
.delete:hover {
  opacity: 1 !important;

  color: #fff !important;

/* v29: hide grid control only; preserve chart */

#gridToggle,
label:has(#gridToggle) {

/* v30: Current Stash inventory + skinny source selector */
.source-row{
  grid-column:1 / -1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:-1px 0 0;
}
.source-btn{
  min-height:28px;
  padding:5px 8px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fffaf2;
  color:#111;
  font-size:10px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
}
.source-btn.active{
  background:#111;
  color:#fff;
  border-color:#111;
}
.source-warning{
  display:none;
  grid-column:1 / -1;
  margin:-1px 0 0;
  padding:7px 9px;
  border:1px dashed var(--line);
  border-radius:12px;
  background:#f8f2e7;
  color:var(--muted);
  font-size:10px;
  font-weight:700;
  line-height:1.25;
}
.source-warning.show{display:block;}
.stash-check{
  position:absolute;
  top:5px;
  right:5px;
  width:14px;
  height:14px;
  border:1px solid rgba(17,17,17,.26);
  border-radius:999px;
  background:rgba(255,250,242,.62);
  color:#9b9186;
  display:grid;
  place-items:center;
  font-size:9px;
  font-weight:900;
  line-height:1;
  z-index:2;
  cursor:pointer;
  box-shadow:0 1px 2px rgba(18,18,18,.08);
}
.color-btn.in-stash .stash-check{
  background:#111;
  color:#fff;
  border-color:#111;
}
@media (max-width:720px){
  .source-row{gap:9px;}
  .source-btn{min-height:29px;font-size:9px;padding:5px 6px;}
  .stash-check{width:15px;height:15px;font-size:9px;}
}

/* v21: real AI-backed Ask Skein Scheme panel — compact, no fake parser */
.assistant-box{display:grid;gap:10px;}

  width:100%;

  color:#111;
  border-radius:13px;

function hexToRgb(hex){const c=hex.replace('#','');return [0,2,4].map(i=>parseInt(c.slice(i,i+2),16));}

function rgbToHsl(hex){const [r,g,b]=hexToRgb(hex).map(v=>v/255),max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0,s=0,l=(max+min)/2;if(max!==min){const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);h=max===r?(g-b)/d+(g<b?6:0):max===g?(b-r)/d+2:(r-g)/d+4;h/=6}return {h:h*360,s,l};}

function sameFamilyGroup(a,b){
  if(a===b)return true;
  return [
    ['red','pink','purple'],
    ['orange','yellow','brown','red'],
    ['green','blue','gray'],
    ['gray','white','black','blue'],
    ['brown','gray','green','orange']
  ].some(group=>group.includes(a)&&group.includes(b));
}
function nameFamilyHits(name){
  const lower=String(name||'').toLowerCase();
  return Object.entries(NAME_FAMILY_WORDS)
    .filter(([family,words])=>words.some(word=>lower.includes(word)))
    .map(([family])=>family);
}
function colorFitScore(name,info,options={}){
  const strict=!!options.strictColorFit;
  const target=info.primaryFamilies||info.families.slice(0,2);
  const all=unique([...(info.allFamilies||[]),...target]);
  const hits=unique(nameFamilyHits(name));
  if(!hits.length)return strict?-12:0;
  let score=0;
  hits.forEach(hit=>{
    const targetIndex=target.indexOf(hit);
    if(targetIndex===0)score+=52;
    else if(targetIndex===1)score+=36;
    else if(all.includes(hit))score+=18;
    else if(target.some(tf=>sameFamilyGroup(tf,hit)))score+=4;
    else score-=strict?64:30;
  });
  if(strict && hits.every(hit=>!target.includes(hit) && !target.some(tf=>sameFamilyGroup(tf,hit))))score-=45;
  return score;
}

function comboNameInfo(combo=selections){
  const roleWeights={D:4,L:2.6,M:1.7,S:.55,T:.55};
  const roleColors=ROLES.map(r=>({role:r.key,color:combo[r.key]})).filter(x=>x.color);
  const colors=roleColors.map(x=>x.color);
  const allFamilies=roleColors.map(x=>familyFromHex(x.color.hex));
  const weightedCounts={};
  roleColors.forEach(({role,color})=>{
    const family=familyFromHex(color.hex);
    weightedCounts[family]=(weightedCounts[family]||0)+(roleWeights[role]||1);
  });
  const ordered=Object.entries(weightedCounts).sort((a,b)=>b[1]-a[1]).map(([f])=>f);
  const lums=colors.map(c=>luminance(c.hex));
  const contrast=lums.length?Math.max(...lums)-Math.min(...lums):0;
  const yarnTerms=[];
  const primaryYarnTerms=[];
  roleColors.forEach(({role,color})=>{
    String(color.name||'').toLowerCase().split(/[^a-z0-9]+/).forEach(w=>{
      if(w&&w.length>2){
        yarnTerms.push(w);
        if(['D','L','M'].includes(role))primaryYarnTerms.push(w);
      }
    });
  });
  return {colors,families:ordered,primaryFamilies:ordered.slice(0,2),allFamilies,contrast,yarnTerms:unique(yarnTerms),primaryYarnTerms:unique(primaryYarnTerms),weightedCounts};
}

function profileKeys(info){
  const set=new Set(info.allFamilies),keys=[];
  if((set.has('blue')||set.has('purple'))&&(set.has('gray')||set.has('white')||set.has('black')))keys.push('cool');
  if(set.has('orange')||set.has('red')||set.has('yellow'))keys.push('warm');
  if(set.has('brown')||set.has('green')||(set.has('orange')&&set.has('gray')))keys.push('earthy');
  if((set.has('purple')||set.has('blue'))&&(set.has('black')||set.has('gray')))keys.push('dusk');
  if(info.contrast>.58 && (set.has('red')||set.has('orange')||set.has('yellow')||set.has('pink')) && set.size>=3)keys.push('bright');
  if((set.has('orange')||set.has('red')||set.has('brown'))&&set.has('gray'))keys.push('neutralWarm');
  if(set.has('white')&&info.contrast<.7)keys.push('soft');
  return unique(keys);
}

}

function nameSimilarity(a,b){const aw=new Set(meaningfulWords(a)),bw=new Set(meaningfulWords(b));if(!aw.size||!bw.size)return 0;let inter=0;aw.forEach(w=>{if(bw.has(w))inter++;});return inter/Math.max(aw.size,bw.size);}
function nameSignature(name){
  const lower=String(name||'').toLowerCase();
  const phrases=['side eye','coin toss','button panic','plot twist','after hours','after dark','afterimage','went sideways','got promoted','got loud','got loose','made trouble','borrowed fire','in the breeze','lost the plot','weather report','left turn','took five','backtalk','detour','alibi','mischief','ruckus','confetti','forecast','punchline','rendezvous','assembly','carnival','parade','riot','daydream','social'];
  const found=phrases.find(p=>lower.includes(p));
  if(found)return found;
  const words=meaningfulWords(name);
  return words.slice(-1)[0]||lower;
}
function startsWithKey(name){return meaningfulWords(name)[0]||'';}
function isBadLocalName(name){
  const lower=String(name||'').toLowerCase();
  if(!lower||lower.length<7||lower.length>56)return true;
  if(NAME_BAD_BITS.some(bit=>lower.includes(bit)))return true;
  const words=meaningfulWords(name);
  if(words.length<2||words.length>4)return true;
  if(words.some(w=>NAME_WEAK_WORDS.has(w)))return true;
  if(/^blue\s/i.test(name)||/^grass\s/i.test(name))return true;
  if(words.length===4 && lower.startsWith('the '))return true;
  if(!words.some(w=>CORE_COLORWAY_WORDS.has(w)) && !/\b(lapis|lavender|pumpkin|nectarine|cabernet|burgundy|cobalt|ivory|charcoal|graphite|bluegrass|river|olive|moss|sage|cocoa|walnut|marigold|chili|papaya|flamingo|blackberry|grape|pool|sea|stormglass|razzleberry|saffron|paprika|peony|cider|marmalade|hot|sauce|cranberry|ruby|cherry|honey|mustard|cream|snow|ink|midnight|denim|sapphire|violet|plum|orchid|cotton|candy|copper|rust|terracotta|mocha|praline|aspen|fog|smoke|silver|pearl)\b/i.test(lower))return true;
  return false;
}
function scoreLocalName(name,info,options={}){
  let score=100;
  const lower=name.toLowerCase();
  const recent=nameHistory.slice(-160);
  const recentShort=nameHistory.slice(-34);
  const words=meaningfulWords(name);
  const sig=nameSignature(name);
  const first=startsWithKey(name);

  if(words.length===2)score+=16;
  if(words.length===3)score+=24;
  if(words.length===4)score+=4;

  if(/\b(confetti|forecast|riot|rendezvous|assembly|backtalk|afterimage|alibi|detour|punchline|mischief|coin toss|went sideways|borrowed fire|in the breeze|got promoted|lost the plot|button panic|made trouble|left turn)\b/i.test(name))score+=14;
  if(/\b(lapis|lavender|pumpkin|nectarine|cabernet|burgundy|cobalt|ivory|charcoal|graphite|bluegrass|river rock|olive|moss|sage|cocoa|walnut|marigold|chili|papaya|flamingo|blackberry|grape soda|pool tile|sea glass|stormglass|razzleberry|saffron|paprika|peony|denim|sapphire|violet|plum|orchid|cider|marmalade|hot sauce|cranberry|ruby|honey|mustard|cream soda|ink spill|midnight|copper|rust|terracotta|mocha|praline|aspen|foglight|smoke|silver)\b/i.test(name))score+=22;

  score+=colorFitScore(name,info,options);

  if(recent.includes(lower))score-=360;

  recent.forEach(old=>{
    const sim=nameSimilarity(name,old);
    if(sim>.65)score-=150;
    else if(sim>.45)score-=88;
    else if(sim>.34)score-=38;
  });

  const recentSigs=recentShort.map(nameSignature);
  const recentFirsts=recentShort.map(startsWithKey);
  const sigCount=recentSigs.filter(s=>s===sig).length;
  const firstCount=recentFirsts.filter(f=>f===first).length;

  if(sigCount)score-=105+(sigCount*60);
  if(firstCount)score-=52+(firstCount*24);

  const recentWords=recentShort.flatMap(meaningfulWords);
  words.forEach(w=>{
    if(w.length>4){
      const count=recentWords.filter(rw=>rw===w).length;
      if(count)score-=30+(count*24);
    }
  });

  return score;
}
function weightedNamePick(ranked){
  if(!ranked.length)return '';
  const minScore=Math.min(...ranked.map(x=>x.score));
  const weighted=ranked.map((item,index)=>{
    const quality=Math.max(1,item.score-minScore+8);
    const rankTaper=1/(1+(index*.18));
    return {...item,weight:quality*rankTaper};
  });
  const total=weighted.reduce((sum,item)=>sum+item.weight,0);
  let roll=Math.random()*total;
  for(const item of weighted){
    roll-=item.weight;
    if(roll<=0)return item.name;
  }
  return weighted[weighted.length-1].name;
}
function buildDiverseNamePool(ranked,limit=18){
  const pool=[];
  const usedSigs=new Set();
  const usedFirsts=new Set();

  ranked.forEach(item=>{
    if(pool.length>=limit)return;
    if(usedSigs.has(item.signature))return;
    if(usedFirsts.has(item.first)&&pool.length>5)return;
    pool.push(item);
    usedSigs.add(item.signature);
    usedFirsts.add(item.first);
  });

  ranked.forEach(item=>{
    if(pool.length>=limit)return;
    if(pool.some(existing=>existing.name===item.name))return;
    const sigDupes=pool.filter(existing=>existing.signature===item.signature).length;
    const firstDupes=pool.filter(existing=>existing.first===item.first).length;
    if(sigDupes>=2||firstDupes>=2)return;
    pool.push(item);
  });

  return pool;
}
function generateComboName(combo=selections,offset=0,options={}){
  loadNameHistory();
  const info=comboNameInfo(combo);
  const savedKeys=savedComboNameKeys();
  const excludeUnavailable=name=>!isSavedComboName(name,savedKeys);
  let candidates=buildCandidateNames(combo).filter(n=>!isBadLocalName(n)&&excludeUnavailable(n));
  if(candidates.length<8)candidates=unique([...candidates,...FALLBACK_DECK]).filter(n=>!isBadLocalName(n)&&excludeUnavailable(n));

  const ranked=candidates
    .map(name=>({
      name,
      score:scoreLocalName(name,info,options),
      signature:nameSignature(name),
      first:startsWithKey(name)
    }))
    .sort((a,b)=>b.score-a.score);

  const diversePool=buildDiverseNamePool(ranked,18);
  let chosen=weightedNamePick(diversePool);

  if(!chosen){
    const emergency=unique([...FALLBACK_DECK,'Ivory Side Eye','Cabernet Confetti','Chili Forecast']).filter(excludeUnavailable);
    chosen=emergency[0]||'Ivory Side Eye';
  }

  rememberName(chosen);
  return chosen;
}

function renderPalette(){const q=el('search').value.trim().toLowerCase();const p=el('palette');p.innerHTML='';COLORS.filter(c=>(filter==='Full Palette'||isInStash(c))&&(!q||c.name.toLowerCase().includes(q)||c.number.toLowerCase().includes(q)||c.hex.toLowerCase().includes(q))).forEach(c=>{const used=ROLES.some(r=>selections[r.key].number===c.number);const inStash=isInStash(c);const b=document.createElement('button');b.className='color-btn'+(used?' selected':'')+(inStash?' in-stash':'');b.innerHTML=`<span class="stash-check" title="Toggle Current Stash" aria-label="Toggle Current Stash">✓</span><div class="color-swatch" style="background:${c.hex}"></div><div class="color-num">${c.number}</div><div class="color-name">${c.name}</div>`;b.onclick=()=>{selections[activeRole]=c;currentNameSeed=0;nameHistoryStack=[];leaveSavedContext();renderAll();};b.querySelector('.stash-check').onclick=e=>{e.stopPropagation();toggleStash(c);};p.appendChild(b);});}
function metrics(){const pairs=[['Main vs Contrast',selections.D,selections.L,3],['Main vs Accent',selections.D,selections.M,1.6],['Stripe A vs B',selections.S,selections.T,1.6]];el('metrics').innerHTML=pairs.map(([t,a,b,target])=>{const r=contrastRatio(a.hex,b.hex),w=Math.min(100,Math.round(r/7*100));return `<div class="metric"><div class="metric-top"><span>${t}</span><strong>${r.toFixed(1)}:1</strong></div><div class="bar"><div class="fill" style="width:${w}%"></div></div></div>`;}).join('');}
function isReadable(combo){const nums=ROLES.map(r=>combo[r.key].number);return new Set(nums).size===nums.length&&contrastRatio(combo.D.hex,combo.L.hex)>=3&&contrastRatio(combo.D.hex,combo.M.hex)>=1.6&&contrastRatio(combo.S.hex,combo.T.hex)>=1.6;}
function randomize(){
  leaveSavedContext();
  nameHistoryStack=[];
  const pool=randomSource==='stash'?stashColors():COLORS;
  if(pool.length<ROLES.length){
    renderSourceButtons();
    return;
  }
  history.push({selections:cloneSelections(),name:currentComboName,seed:currentNameSeed});
  let combo=cloneSelections();
  for(let tries=0;tries<1500;tries++){
    const used=new Set(ROLES.filter(r=>lockedRoles[r.key]).map(r=>combo[r.key].number));
    ROLES.forEach(r=>{
      if(!lockedRoles[r.key]){
        const opts=pool.filter(c=>!used.has(c.number));
        if(opts.length){
          combo[r.key]=opts[Math.floor(Math.random()*opts.length)];
          used.add(combo[r.key].number);
        }
      }
    });
    if(isReadable(combo))break;
  }
  selections = combo;
  currentNameSeed = 0;
  currentComboName = generateComboName(selections, currentNameSeed);
  renderAll();
}
function back(){const prev=history.pop();if(!prev)return;leaveSavedContext();selections=cloneSelections(prev.selections);currentComboName=prev.name;currentNameSeed=prev.seed;nameHistoryStack=[];renderAll();}
function newName() {
  if(savedContextMode) return;
  nameHistoryStack.push(currentComboName);
  nameHistoryStack=nameHistoryStack.slice(-40);
  currentNameSeed++;
  currentComboName = generateComboName(selections, currentNameSeed, {strictColorFit:true});
  renderAll();
}
function backName(){
  if(!nameHistoryStack.length || savedContextMode) return;
  currentComboName=nameHistoryStack.pop();
  currentNameSeed=Math.max(0,currentNameSeed-1);
  renderAll();
}
function openSaveDrawer(kind){pendingSaveKind=kind;const title=kind==='made'?'SAVE TO MADE COMBOS':'SAVE TO DIGGED COMBOS';el('drawerTitle').textContent=title;el('confirmSave').textContent=title;el('drawerSub').textContent='';el('saveDrawer').classList.add('open');el('saveDrawer').setAttribute('aria-hidden','false');setTimeout(()=>el('saveName').focus(),40);updateSaveState();}
function blurActiveSaveField(){
  try{
    const active=document.activeElement;
    if(active && typeof active.blur==='function') active.blur();
  }catch(e){}
}
function closeSaveDrawer(){blurActiveSaveField();el('saveDrawer').classList.remove('open');el('saveDrawer').setAttribute('aria-hidden','true');}
let saveInProgress=false;
async function savePending(){
  blurActiveSaveField();
  if(saveInProgress) return;
  const name=el('saveName').value.trim();
  if(!name){el('saveName').focus();updateSaveState();return;}

  saveInProgress=true;
  el('confirmSave').disabled=true;

  const item={kind:pendingSaveKind,name,note:el('saveNote').value.trim(),comboName:currentComboName,selections:cloneSelections(),at:new Date().toISOString()};

  try{
    if(db){
      const payload={
        type: item.kind==='dig'?'digged':'made',
        combo_name:item.comboName,
        saved_by:item.name,
        note:item.note||null,
        colors_json:item.selections
      };
      const {error}=await db.from('combos').insert(payload);
      if(error){
        console.error('Supabase save failed',error);
        saved.unshift(item); saved=saved.slice(0,60);
        try{localStorage.setItem(STORAGE,JSON.stringify(saved.filter(x=>!x.remote)));}catch(e){}
        renderSaved();
        alert('Shared save failed. It saved locally on this device only.');
      }else{
        await loadSharedCombos();
      }
    }else{
      saved.unshift(item); saved=saved.slice(0,60);
      try{localStorage.setItem(STORAGE,JSON.stringify(saved.filter(x=>!x.remote)));}catch(e){}
      renderSaved();
    }

    closeSaveDrawer();
    el('saveName').value='';
    el('saveNote').value='';
  }finally{
    saveInProgress=false;
    updateSaveState();
  }
}
function escapeHTML(s=''){return String(s).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}

function loadChartPreviewPreference(){
  chartPreviewPinned=false;
  chartPreviewMode=null;
  try{localStorage.removeItem(CHART_PREVIEW_STORAGE);}catch(e){}
  document.body.classList.remove('chart-preview-on','chart-preview-good','chart-preview-palette');
}
function updateChartPreviewToggle(){
  const toggles=[
    {btn:el('chartPreviewToggle'),mode:'good'},
    {btn:el('paletteChartPreviewToggle'),mode:'palette'}
  ];
  toggles.forEach(({btn,mode})=>{
    if(!btn) return;
    const active=chartPreviewPinned && chartPreviewMode===mode;
    btn.classList.toggle('active',active);
    btn.setAttribute('aria-pressed',active?'true':'false');
    btn.title=active?'Turn off chart preview':'Chart preview';
  });
}
function updateNameControls(){
  document.body.classList.toggle('saved-context-mode',!!savedContextMode);
  const btn=el('nameBackBtn');
  if(btn) btn.disabled=!nameHistoryStack.length || !!savedContextMode;
}
function enterSavedContext(){
  savedContextMode=true;
  updateNameControls();
}
function leaveSavedContext(){
  if(!savedContextMode){updateNameControls();return;}
  savedContextMode=false;
  updateNameControls();
}
function scrollSectionForPinnedPreview(sectionId){
  if(!chartPreviewPinned) return;
  const section=el(sectionId);
  const chartCard=document.querySelector('.chart-card');
  if(!section || !chartCard) return;
  window.requestAnimationFrame(()=>{
    const chartHeight=chartCard.getBoundingClientRect().height||0;
    const sectionTop=section.getBoundingClientRect().top+window.scrollY;
    const target=Math.max(0,sectionTop-chartHeight-8);
    window.scrollTo({top:target,behavior:'smooth'});
  });
}
function scrollGoodStuffForPinnedPreview(){
  if(chartPreviewPinned && activeSavedTab) scrollSectionForPinnedPreview('savedSection');
}
function setChartPreviewPinned(next,{scroll=true,mode='good'}={}){
  chartPreviewPinned=!!next;
  chartPreviewMode=chartPreviewPinned?mode:null;
  document.body.classList.toggle('chart-preview-on',chartPreviewPinned);
  document.body.classList.toggle('chart-preview-good',chartPreviewPinned && chartPreviewMode==='good');
  document.body.classList.toggle('chart-preview-palette',chartPreviewPinned && chartPreviewMode==='palette');
  updateChartPreviewToggle();
  drawChart();
  if(chartPreviewPinned && scroll){
    scrollSectionForPinnedPreview(chartPreviewMode==='palette'?'paletteSection':'savedSection');
  }
}

function renderSavedList(id,kind){
  const list=saved.filter(x=>x.kind===kind),box=el(id);
  if(!box) return 0;
  box.innerHTML='';
  if(!list.length){
    const msg=kind==='dig'
      ? 'Nothing saved yet. Randomize something worth keeping.'
      : 'No finished combos logged yet. Make one official when it hits the sticks.';
    box.innerHTML=`<div class="empty">${msg}</div>`;
    return 0;
  }
  list.forEach(item=>{
    const d=document.createElement('div');
    d.className='saved-card'+(kind==='made'?' made-card':'');
    const deleteButton=`<button class="delete" aria-label="delete">×</button>`;
    const editNoteLabel=item.note?'Edit note':'Add note';
    const editNoteButton=kind==='made'
      ? `<button class="saved-note-edit" type="button" aria-label="${editNoteLabel}" title="${editNoteLabel}">✎</button>`
      : '';
    d.innerHTML=`${deleteButton}<div class="saved-colors">${ROLES.map(r=>`<span class="mini" style="background:${item.selections?.[r.key]?.hex||'#ddd'}"></span>`).join('')}</div><div class="saved-title">${escapeHTML(item.comboName)}</div><div class="saved-meta">by ${escapeHTML(item.name)}</div>${item.note?`<div class="saved-note">${escapeHTML(item.note)}</div>`:''}${editNoteButton}`;
    d.onclick=e=>{
      if(e.target.classList.contains('delete')||e.target.classList.contains('saved-note-edit'))return;
      selections=cloneSelections(item.selections);
      currentComboName=item.comboName;
      nameHistoryStack=[];
      enterSavedContext();
      renderAll();
    };
    const del=d.querySelector('.delete');
    del.onclick=async(event)=>{
      event.stopPropagation();
      await deleteSavedItem(item);
    };
    const edit=d.querySelector('.saved-note-edit');
    if(edit){
      edit.onclick=async(event)=>{
        event.stopPropagation();
        await editMadeNote(item);
      };
    }
    box.appendChild(d);
  });
  return list.length;
}

function setSavedTab(kind){
  const next=kind==='made'?'made':'dig';
  activeSavedTab=activeSavedTab===next?null:next;
  if(activeSavedTab) enterSavedContext(); else leaveSavedContext();
  updateSavedTabs();
}

function updateSavedTabs(){
  const digTotal=saved.filter(x=>x.kind==='dig').length;
  const madeTotal=saved.filter(x=>x.kind==='made').length;
  const config={
    dig:{title:'Saved Combos',copy:"What we’re digging!"},
    made:{title:'Made Combos',copy:'What we made!'}
  };
  ['dig','made'].forEach(kind=>{
    const active=activeSavedTab===kind;
    const tab=el(kind==='dig'?'digTab':'madeTab');
    const panel=el(kind==='dig'?'digPanel':'madePanel');
    if(tab){tab.classList.toggle('active',active);tab.setAttribute('aria-selected',active?'true':'false');}
    if(panel){panel.classList.toggle('active',active);}
  });
  if(el('digCount')) el('digCount').textContent=digTotal;
  if(el('madeCount')) el('madeCount').textContent=madeTotal;
  const head=el('savedTabHead');
  if(head) head.classList.toggle('is-hidden',!activeSavedTab);
  if(activeSavedTab && config[activeSavedTab]){
    if(el('savedTabTitle')) el('savedTabTitle').textContent=config[activeSavedTab].title;
    if(el('savedTabCopy')) el('savedTabCopy').textContent=config[activeSavedTab].copy;
  }else{
    if(el('savedTabTitle')) el('savedTabTitle').textContent='';
    if(el('savedTabCopy')) el('savedTabCopy').textContent='';
  }
  updateChartPreviewToggle();
  if(chartPreviewPinned && activeSavedTab) scrollGoodStuffForPinnedPreview();
}

async function editMadeNote(item){
  if(!item || item.kind!=='made') return;

  const code=prompt('Admin code to edit this Made note:');
  if(!code) return;

  if(code !== ADMIN_CODE){
    alert('Nice try.');
    return;
  }

  const next=prompt('Update note:', item.note||'');
  if(next===null) return;
  const clean=next.trim().slice(0,120);

  if(item.remote){
    if(!db){
      alert('Shared edit is unavailable right now.');
      return;
    }

    let savedRemote=false;
    const rpcResult=await db.rpc('update_combo_note_admin',{combo_id:item.id,new_note:clean||null,admin_code:code});
    if(!rpcResult.error){
      savedRemote=true;
    }else{
      console.warn('Supabase note-edit RPC unavailable or failed; trying direct update.',rpcResult.error);
      const directResult=await db.from('combos').update({note:clean||null}).eq('id',item.id);
      if(!directResult.error){
        savedRemote=true;
      }else{
        console.error('Supabase note edit failed',directResult.error);
        alert('Edit failed. Supabase needs the note-edit admin function or an update policy for combo notes.');
        return;
      }
    }

    if(savedRemote){
      item.note=clean;
      renderSaved();
      await loadSharedCombos();
    }
    return;
  }

  item.note=clean;
  try{localStorage.setItem(STORAGE,JSON.stringify(saved.filter(x=>!x.remote)));}catch(e){}
  renderSaved();
}

async function deleteSavedItem(item){
  if(!item) return;

  const code=prompt(
    "Whoops, did you accidentally save an ugly one? Embarrassing! Text Bryant and he\'ll delete it.\n\n" +
    'Admin code:'
  );

  if(!code) return;

  if(code !== '123'){
    alert('Nice try.');
    return;
  }

  if(item.remote){
    if(!db){
      alert('Shared delete is unavailable right now.');
      return;
    }

    const {error}=await db.rpc('delete_combo_admin',{combo_id:item.id,admin_code:code});
    if(error){
      console.error('Supabase delete failed',error);
      alert('Delete failed. Check admin code or Supabase delete setup.');
      return;
    }
  }

  saved=saved.filter(x=>x!==item);

  try{
    localStorage.setItem(STORAGE,JSON.stringify(saved.filter(x=>!x.remote)));
  }catch(e){}

  renderSaved();

  if(db){
    await loadSharedCombos();
  }
}
function renderSaved(){renderSavedList('digCombos','dig');renderSavedList('madeCombos','made');updateSavedTabs();}
function updateSaveState(){const ok=!!el('saveName').value.trim();el('confirmSave').disabled=!ok;el('saveBtn').classList.toggle('active-save',pendingSaveKind==='dig'&&el('saveDrawer').classList.contains('open'));el('madeBtn').classList.toggle('active-save',pendingSaveKind==='made'&&el('saveDrawer').classList.contains('open'));}
function swapStripeColors(){
  const a=selections.S;
  selections.S=selections.T;
  selections.T=a;
  leaveSavedContext();
  renderAll();
}
function renderAll(){drawChart();renderDots();renderRoles();renderPalette();metrics();renderSourceButtons();el('backBtn').disabled=!history.length;updateSaveState();updateChartPreviewToggle();updateNameControls();}
async function loadSharedCombos(){
  let local=[];
  try{local=JSON.parse(localStorage.getItem(STORAGE)||'[]');}catch(e){local=[];}
  if(!db){saved=local;renderSaved();return;}
  const {data,error}=await db.from('combos').select('*').order('created_at',{ascending:false}).limit(100);
  if(error){console.error('Supabase load failed',error);saved=local;renderSaved();return;}
  const remote=(data||[]).map(row=>({
    kind: row.type==='digged'?'dig':'made',
    name: row.saved_by||'',
    note: row.note||'',
    id: row.id,
    comboName: row.combo_name||'saved combo',
    selections: row.colors_json,
    at: row.created_at,
    remote:true
  })).filter(x=>x.selections);
  saved=[...remote,...local.filter(x=>!x.remote)];
  renderSaved();
}

async function init(){
  loadChartPreviewPreference();
  updateChartPreviewToggle();
  // Render the chart immediately. Do not let a slow CDN/Supabase load leave the page half-built.
  renderFilters();
  renderAll();
  await loadSupabaseClient();
  await loadStashInventory();
  renderAll();
  await loadSharedCombos();
}
el('gridToggle').onchange=drawChart;el('randomBtn').onclick=randomize;el('backBtn').onclick=back;el('sourceFullBtn').onclick=()=>setRandomSource('full');el('sourceStashBtn').onclick=()=>setRandomSource('stash');el('newNameBtn').onclick=newName;if(el('nameBackBtn')) el('nameBackBtn').onclick=backName;el('saveBtn').onclick=()=>openSaveDrawer('dig');el('madeBtn').onclick=()=>openSaveDrawer('made');if(el('digTab')) el('digTab').onclick=()=>setSavedTab('dig');if(el('madeTab')) el('madeTab').onclick=()=>setSavedTab('made');if(el('chartPreviewToggle')) el('chartPreviewToggle').onclick=()=>setChartPreviewPinned(!(chartPreviewPinned&&chartPreviewMode==='good'),{scroll:true,mode:'good'});if(el('paletteChartPreviewToggle')) el('paletteChartPreviewToggle').onclick=()=>setChartPreviewPinned(!(chartPreviewPinned&&chartPreviewMode==='palette'),{scroll:true,mode:'palette'});if(el('swapStripesBtn')) el('swapStripesBtn').onclick=swapStripeColors;if(el('rolesSection')) el('rolesSection').addEventListener('toggle',()=>{if(el('rolesSection').open) leaveSavedContext();});if(el('paletteSection')) el('paletteSection').addEventListener('toggle',()=>{if(el('paletteSection').open) leaveSavedContext();});el('confirmSave').onclick=savePending;el('cancelSave').onclick=closeSaveDrawer;el('closeSaveDrawer').onclick=closeSaveDrawer;el('saveDrawer').addEventListener('click',e=>{if(e.target.id==='saveDrawer')closeSaveDrawer();});el('search').oninput=renderPalette;el('saveName').oninput=updateSaveState;window.addEventListener('resize',drawChart);init();
</script>
