/* v17 targeted fix: keep combo name clear; place name action beneath Grid */
.combo-strip{
  grid-template-columns:minmax(0,1fr) auto !important;
  grid-template-areas:"combo grid" "combo name" !important;

}

  min-width:0 !important;
  padding-right:4px !important;
}
#comboName{
  display:block !important;
  max-width:100% !important;
}
.toggle{
  grid-area:grid !important;
  justify-self:end !important;
  align-self:start !important;
}

  justify-self:end !important;
  align-self:end !important;

/* v20: make 5-color lock checkboxes clearer without changing layout */
.role-lock,
.lock-check,
input[type="checkbox"].role-lock,
.role-card input[type="checkbox"] {
  width: 24px !important;
  height: 24px !important;
  min-width: 24px !important;
  border: 2px solid #111 !important;
  border-radius: 7px !important;
  background: #fffaf2 !important;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.65), 0 1px 0 rgba(0,0,0,.12) !important;
  accent-color: #111 !important;
}

.role-card.locked .role-lock,
.role-lock.locked,
.role-card input[type="checkbox"]:checked {
  background: #111 !important;
  border-color: #111 !important;
  color: #fff !important;
  box-shadow: 0 0 0 2px rgba(17,17,17,.12) !important;
}

.role-lock::after {
  font-weight: 900 !important;
}

@media (max-width: 720px) {
  .role-lock,
  .lock-check,
  input[type="checkbox"].role-lock,
  .role-card input[type="checkbox"] {
    width: 25px !important;
    height: 25px !important;
    min-width: 25px !important;
    border-radius: 7px !important;
  }
}


/* v25: clean lock checkbox — empty when unlocked, real monochrome SVG lock when checked */
.role-lock,
.lock-check,
.role-card input[type="checkbox"] {
  appearance: none !important;
  -webkit-appearance: none !important;
  width: 25px !important;
  height: 25px !important;
  min-width: 25px !important;
  border: 2px solid #222 !important;
  border-radius: 7px !important;
  background-color: #fffaf2 !important;
  background-image: none !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
  background-size: 15px 15px !important;
  cursor: pointer !important;
  position: relative !important;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 1px 0 rgba(0,0,0,.12) !important;
}

.role-lock::before,
.lock-check::before,
.role-card input[type="checkbox"]::before,
.role-lock::after,
.lock-check::after,
.role-card input[type="checkbox"]::after {
  content: none !important;
  display: none !important;
}

.role-lock:checked,
.lock-check:checked,
.role-card input[type="checkbox"]:checked {
  background-color: #111 !important;
  border-color: #111 !important;
  background-image: url("data:image/svg+xml,%3Csvg width='18' height='18' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='6' y='10' width='12' height='10' rx='2' stroke='white' stroke-width='2.4'/%3E%3Cpath d='M8.5 10V7.8C8.5 5.7 10.1 4 12 4C13.9 4 15.5 5.7 15.5 7.8V10' stroke='white' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E") !important;
}

let recentNames = [];

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getColorFamilyFromHex(hex) {
  const { h, s, l } = hexToHslPercent(hex);

  if (l < 12) return "black";
  if (l > 88 && s < 18) return "white";
  if (s < 15) return "gray";
  if (h >= 345 || h < 15) return "red";
  if (h >= 15 && h < 45) return "orange";
  if (h >= 45 && h < 70) return "yellow";
  if (h >= 70 && h < 165) return "green";
  if (h >= 165 && h < 250) return "blue";
  if (h >= 250 && h < 300) return "purple";
  if (h >= 300 && h < 345) return "pink";
  return "brown";
}

function getPaletteCluesFromCombo(combo = selections) {
  const hexes = ROLES.map(role => combo[role.key]?.hex).filter(Boolean);
  const families = [...new Set(hexes.map(getColorFamilyFromHex))];
  let clues = [];

  families.forEach(family => {
    if (colorClues[family]) clues.push(...colorClues[family]);
  });

  if (!clues.length) clues = ["Static", "Motel", "Oddball"];

  return [...new Set(clues)];
}

function generateComboName(combo = selections, offset = 0) {
  const clues = getPaletteCluesFromCombo(combo);

  for (let attempt = 0; attempt < 80; attempt++) {
    const pattern = pick(funkyPatterns);

    if (recentPatterns.includes(pattern) && Math.random() < 0.8) continue;

    const name = pattern
      .replaceAll("{color}", pick(clues))
      .replaceAll("{object}", pick(objects))
      .replaceAll("{place}", pick(places));

    if (isGoodName(name)) {
      recentNames.push(name);
      recentPatterns.push(pattern);

      recentNames = recentNames.slice(-20);
      recentPatterns = recentPatterns.slice(-8);

      return name;
    }
  }

  return `${pick(clues)} Gets Weird`;
}

function isGoodName(name) {
  const lower = name.toLowerCase();

  if (recentNames.includes(name)) return false;
  if (bannedWords.some(word => lower.includes(word))) return false;
  if (name.length < 8 || name.length > 32) return false;

  const words = lower.split(/\s+/);
  if (new Set(words).size !== words.length) return false;

  return true;
}

function hexToHslPercent(hex) {
  hex = hex.replace("#", "");
  let r = parseInt(hex.substring(0, 2), 16) / 255;
  let g = parseInt(hex.substring(2, 4), 16) / 255;
  let b = parseInt(hex.substring(4, 6), 16) / 255;

  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  let h = 0, s = 0;
  const l = (max + min) / 2;

  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

    switch (max) {
      case r:
        h = ((g - b) / d + (g < b ? 6 : 0));
        break;
      case g:
        h = ((b - r) / d + 2);
        break;
      case b:
        h = ((r - g) / d + 4);
        break;
    }

    h *= 60;
  }

  return { h, s: s * 100, l: l * 100 };
}
